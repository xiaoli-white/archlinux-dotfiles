<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <match target="scan">
        <test name="family">
            <string>Monaco</string>
        </test>
        <edit name="spacing">
            <int>100</int>
        </edit>
        <edit name="family">
            <string>Monaco</string>
        </edit>
    </match>
  
    <alias>
        <family>monospace</family>
        <prefer>
            <family>Monaco</family>
        </prefer>
    </alias>
</fontconfig>
