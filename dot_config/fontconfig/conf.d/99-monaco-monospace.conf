<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- 强制 Monaco 被识别为等宽字体 -->
  <match target="scan">
    <test name="family">
      <string>Monaco</string>
    </test>
    <edit name="spacing">
      <int>100</int>
    </edit>
    <edit name="family">
      <string>Monaco</string>
    </edit>
  </match>
  
  <!-- 确保 kitty 查询 monospace 时能匹配到 Monaco -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Monaco</family>
    </prefer>
  </alias>
</fontconfig>
